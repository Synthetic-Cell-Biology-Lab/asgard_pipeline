  iqtree:
    model: MFP
    seqtype: AA
    bootstrap: 1000
    bootstrap_method: -B
    alrt: 1000
    outgroup: null
    seed: 12345
    ninit: 100
    ntop: 20
    nbest: 5
    nstop: 200
    niter: null
    max_iter: 1000
    epsilon: 0.01
    threads: 8
    extra_args: ''
