base_dir: /home/anirudh/asgard_pipeline
env_dir: /home/anirudh/asgard_pipeline/bin/envs
itol_project: Asgard
reason: To perform phylogenetic analysis for gelsolin
default_annotation: null
from_manual: false
from_fasta_csv: false
alignment:
  method: famsa
  famsa:
    threads: 8
    extra_args: ''
  mafft:
    mode: --linsi
    threads: 8
    extra_args: ''
trimming:
  method: clipkit
  trimal:
    mode: -automated1
