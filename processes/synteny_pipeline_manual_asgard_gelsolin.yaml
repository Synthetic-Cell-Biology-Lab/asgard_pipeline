###########################################################
# Pipeline
###########################################################

# Pipeline name to execute
pipeline: synteny_pipeline


###########################################################
# Run Metadata
###########################################################

# Identifier for this run (timestamp used if omitted)
run_id: gelsolin_m1

# Base directory for the pipeline
base_dir: "/home/anirudh/asgard_pipeline"

# Conda environment directory
env_dir: "/home/anirudh/asgard_pipeline/bin/envs"

# Directory for pipeline logs
log_dir: "/home/anirudh/asgard_pipeline/logs/pipeline_logs/"

# Description or purpose of the run
reason: "cluster gelsolins"

# Number of CPU cores available for the workflow
cores: 24


###########################################################
# ID Extraction Mode
###########################################################



###########################################################
# IPS Parsing mode
###########################################################
# Extract IDs from InterProScan results
parse_ips: False
# Remove sequences annotated as hypothetical proteins
remove_hypotheticals: False



# Search Strategy

# Case-insensitive substring search
search_string: gel

# Regex search pattern (set to null if unused)
rstring: null


###########################################################
# Manual annotation mode
###########################################################

# Extract IDs from manual annotations
from_manual: True
taxon_level: phylum
taxon_filter: Asgardarchaeota
manual_annotation_filter: ['2dgelx', '1dgelx', '2dgel', '1dgelxx', 'gel_dynein', '3dgel', 'gel']

###########################################################
# HMMsearch mode
###########################################################

# Extract IDs from HMM search
hmmsearch: false

from_database: True


RUN_SSN: True
SSN_BITSCORES: [50, 80, 100, 120, 150, 170, 200]
copy_to_windows: True
windows_path: /mnt/e/ssn_outputs

###########################################################
# Biological Target
###########################################################




# Target protein or family name
protein_name: gelsolin


###########################################################
# Input Files
###########################################################


interproscan_file: /home/anirudh/asgard_pipeline/database/collated/Version1/filtered/85comp10con/IPS/protein_summary.parquet
interproscan_full: /home/anirudh/asgard_pipeline/database/collated/Version1/filtered/85comp10con/IPS/asgard_ips_results_feb5.parquet

# genome_file
genome_file: /home/anirudh/asgard_pipeline/database/collated/Version1/filtered/85comp10con/genome_file/jan2026_85comp10con_gf.csv

# Master protein annotation table
protein_file: /home/anirudh/asgard_pipeline/database/collated/Version1/filtered/85comp10con/protein_file/jan2026_85comp10con_pf.csv

# FASTA file containing all protein sequences
fasta_file: /home/anirudh/asgard_pipeline/database/collated/Version1/filtered/85comp10con/fasta/v1_cp85_con10.fasta


gbk_database: /home/anirudh/asgard_pipeline/database/cds_genomes




###########################################################
# Plotting
###########################################################

# violin plot
PLOT_Y_COLUMN: protein_length
ymin: 0
ymax: 5000


PLOT_FILTER_COLUMN: Manual_annotation

PLOT_FILTER_VALS:
  - 2dgelx
  - 1dgelx
  - 2dgel
  - 1dgelxx
  - gel_dynein
  - 3dgel
  - gel

PLOT_DUAL_PROTEINS:


PLOT_TAXON_LEVELS:
  - phylum
  - class
  - order


taxa_levels:
    - phylum
    - class

# presence matrix bubble plot

gene_neighborhood_protein_sets:
  - 2dgelx
  - 1dgelx
  - 2dgel
  - 1dgelxx
  - gel_dynein
  - 3dgel
  - gel

synteny_plot_genomes:
    - GCA_041410205.1_ASM4141020v1_genomic
    - GCA_008000775.2_ASM800077v2_genomic
    - GCA_001940665.2_ASM194066v2_genomic



###########################################################
# Phylogeny Settings
###########################################################

# Threads used during phylogeny construction
phylogeny_threads: 12

# Upload resulting tree to iTOL
run_itol_upload: True

# iTOL project name
itol_project: Asgard

# Default iTOL annotation file
default_annotation: "/home/anirudh/phylogeny/table2itol/ftsz_summary_feb12/iTOL_colorstrip-FtsZ_type.txt"





###########################################################
# Notes
###########################################################

# Exactly one of search_string or rstring must be set
# If both are set or both are null, parse_ips.py will exit