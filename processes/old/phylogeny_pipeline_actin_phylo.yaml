
# ============================================================
# Phylogeny Pipeline Config
# ============================================================
pipeline: phylogeny_pipeline
protein_name:   actin
exploration_id: actin_run4 #run id to continue
run_id:         phyl_run1
log_dir: "/home/anirudh/asgard_pipeline/logs/pipeline_logs/"
base_dir: "/home/anirudh/asgard_pipeline"
env_dir:        /home/anirudh/asgard_pipeline/bin/envs
itol_project:   Asgard
reason: To perform phylogenetic analysis for actin

# Optional: path to a default annotation file passed to iTOL
# on every upload regardless of run-specific annotations
default_annotation: null

# Optional: override input source (both false = expect
# rev.fasta and REVIEW_DONE.flag to already exist in PARENT_DIR)
from_manual:    false
from_fasta_csv: false

# ============================================================
# Alignment
# ============================================================

alignment:
  method: famsa           # famsa | mafft

  famsa:
    threads:    8
    extra_args: ""

  mafft:
    mode:       "--localpair"  # --auto |--localpair | --globalpair | --genafpair
    threads:    8
    extra_args: ""

# ============================================================
# Trimming
# ============================================================

trimming:
  method: clipkit          # trimal | bmge | clipkit

  trimal:
    mode:       "-automated1"   # -automated1 | -gappyout
                                # -strict | -strictplus
    extra_args: ""

  bmge:
    matrix:     BLOSUM62  # BLOSUM30 | BLOSUM45 | BLOSUM62
                          # BLOSUM75 | BLOSUM90 | PAM250
    gap_rate:   0.5       # -g: max gap rate per column (0-1)
    entropy:    0.5       # -h: entropy threshold       (0-1)
    extra_args: ""

  clipkit:
    mode:       "smart-gap"   # smart-gap | gappy | kpic
                              # kpic-smart-gap | kpi | kpi-smart-gap
    extra_args: ""

# ============================================================
# Tree construction
# ============================================================

tree:
  method: iqtree

  iqtree:
    # Substitution model
    # TEST = ModelFinder auto-select
    # or specify directly e.g. LG+G4, WAG+R4, JTT+F+I+G4
    model:            "MFP"
    seqtype:          "AA"     # AA | DNA | CODON | MORPH

    # Bootstrap
    bootstrap:        1000     # number of replicates; null = skip
    bootstrap_method: "-B"     # -B = UFBoot2 (recommended)
                               # -b = standard bootstrap (slow)
    alrt:             1000     # SH-aLRT replicates; null = skip

    # Rooting
    outgroup:         null     # taxon name; null = midpoint rooting

    # Reproducibility
    seed:             12345

    # Tree search
    ninit:            100      # initial parsimony trees
    ntop:             20       # top initial trees retained
    nbest:            5        # best trees retained during search
    nstop:            200      # stop after n iterations without improvement
    niter:            null     # max iterations; null = auto
    max_iter:         1000     # hard ceiling on total iterations (-maxit)
    epsilon:          0.01     # likelihood convergence threshold (-eps)

    # Resources
    threads:          8

    # Any additional flags not covered above
    extra_args:       "-redo"