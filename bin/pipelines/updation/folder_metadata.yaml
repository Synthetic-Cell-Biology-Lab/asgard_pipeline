# ==========================================================
# Folder Metadata - Updation Scripts
# ==========================================================
expand_self: true
expand_subfolders: true
enforce_file_tracking: true

description: >
  Scripts used for repository/database update reporting and structural snapshot generation.

content_type: scripts
curation_status: active
owner: Anirudh
version_tag: 0.1.2

# ----------------------------------------------------------
# FILE-LEVEL DOCUMENTATION
# ----------------------------------------------------------

files:
  folder_metadata.yaml:
    purpose: >
      Metadata manifest for the updation scripts directory.
    stability: stable

  snapshot.py:
    purpose: >
      Generates structural database reports including tree,
      hashing, and appendix aggregation.
    inputs:
      - database_path
    outputs:
      - timestamped snapshot report
      - log file
    dependencies:
      - pathlib
      - yaml
      - hashlib
    stability: stable

# ----------------------------------------------------------
# APPENDIX SECTION (Printed in Report)
# ----------------------------------------------------------

appendix:
  Coverage: >
    Includes all files currently present in bin/pipelines/updation.
