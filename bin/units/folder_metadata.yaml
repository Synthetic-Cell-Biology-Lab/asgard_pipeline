# ==========================================================
# Folder Metadata - Unit Scripts
# ==========================================================
expand_self: true
expand_subfolders: true
enforce_file_tracking: true

description: >
  Standalone utility scripts used across phylogeny, annotation, synteny,
  selection-pressure, and visualization workflows.

content_type: scripts
curation_status: active
owner: Anirudh
version_tag: 0.1.2

# ----------------------------------------------------------
# FILE-LEVEL DOCUMENTATION
# ----------------------------------------------------------

files:
  folder_metadata.yaml:
    purpose: Metadata manifest for all scripts in bin/units.
    stability: stable

  parse_ips.py:
    purpose: Filter InterProScan parquet output by keyword/regex and emit protein ID lists.
    stability: stable

  fasttree_pipeline.sh:
    purpose: Run FastTree on an alignment to quickly infer an exploratory ML tree.
    stability: stable

  phylogeny_pipeline.sh:
    purpose: Wrapper for full phylogeny construction (alignment, trimming, and IQ-TREE inference).
    stability: stable

  itol_upload.sh:
    purpose: Upload trees/annotations to iTOL using the batch uploader API.
    stability: stable

  generate_colorstrip.py:
    purpose: Build iTOL DATASET_COLORSTRIP annotations from FASTA header group labels.
    stability: stable

  table2itol.R:
    purpose: Convert tabular values into iTOL-compatible annotation datasets.
    stability: stable

  get_fasta_csv_from_ids.py:
    purpose: Retrieve FASTA sequences and summary CSV rows for a provided set of IDs.
    stability: stable

  from_manual.py:
    purpose: Build sequence sets using a manually curated list of target proteins.
    stability: stable

  run_ssn.sh:
    purpose: Execute sequence-similarity-network generation utilities for exploratory clustering.
    stability: stable

  extract_sequences.py:
    purpose: Extract selected sequence subsets from larger FASTA collections.
    stability: stable

  subset_dataframe.py:
    purpose: Subset tabular datasets by provided identifiers/filters.
    stability: stable

  subset_annotations.py:
    purpose: Subset annotation tables/files to match selected protein or genome sets.
    stability: stable

  get_annotation_csv.py:
    purpose: Generate/collect annotation CSV outputs for downstream visualization/reporting.
    stability: stable

  extract_proteins_from_cds_genomes.py:
    purpose: Extract protein sequences from CDS/genome sources for pipeline inputs.
    stability: stable

  index_genomes.py:
    purpose: Build genome-level indices/lookup tables used by neighborhood and synteny scripts.
    stability: stable

  get_protein_neighborhoods.py:
    purpose: Compute nearby genes/proteins around query proteins from indexed genomes.
    stability: stable

  extract_synteny.py:
    purpose: Derive synteny blocks/neighborhood summaries for selected proteins/genomes.
    stability: stable

  cluster_neighborhood.py:
    purpose: Cluster neighborhood feature profiles for comparative synteny analyses.
    stability: stable

  annotate_gbk_w_ips.py:
    purpose: Add InterProScan-derived functional labels to GenBank feature annotations.
    stability: stable

  trim_codon_aln.py:
    purpose: Trim codon alignments while preserving frame consistency for selection analyses.
    stability: stable

  selection_prep.sh:
    purpose: Prepare alignments, trees, and supporting inputs for selection-pressure workflows.
    stability: stable

  filter_length_outliers.py:
    purpose: Remove extreme-length sequence outliers prior to alignment/tree inference.
    stability: stable

  bubble_heat_map_presence_matrix.r:
    purpose: Render bubble heatmaps from presence/absence matrix inputs.
    stability: stable

  bubble_heat_map_presence_table.r:
    purpose: Render bubble heatmaps from long-format presence tables.
    stability: stable

  plot_clusters.r:
    purpose: Plot cluster assignments and summaries for exploratory data analysis.
    stability: stable

  taxon_violin_plot.r:
    purpose: Generate violin plots of taxon-level distributions/metrics.
    stability: stable

# ----------------------------------------------------------
# APPENDIX SECTION (Printed in Report)
# ----------------------------------------------------------

appendix:
  Coverage: >
    Includes all files currently present in bin/units.
